<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your tasks in the Smart Student Task Manager. Read, filter, and organize them easily.">
  <title>Smart Student Task Manager | Manage Tasks</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="brand">Smart Student Task Manager</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="add-task.html">Add Task</a></li>
        <li><a href="tasks.html" class="active">Manage Tasks</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>Manage Tasks</h1>
      <p>View, filter, edit, and organize all your tasks below.</p>
    </div>

    <div class="controls-bar">
      <div class="search-bar">
        <input type="text" id="search-input" class="form-control" placeholder="Search tasks by title or keyword...">
      </div>
      <div class="filter-group">
        <label for="filter-select">Filter:</label>
        <select id="filter-select" class="form-control">
          <option value="All">All Tasks</option>
          <option value="Pending">Pending / In Progress</option>
          <option value="Completed">Completed Tasks</option>
          <option value="High Priority">High Priority</option>
        </select>
      </div>
    </div>

    <div class="tasks-grid" id="tasks-container">
      <!-- Tasks injected dynamically via DOM (script.js) -->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
